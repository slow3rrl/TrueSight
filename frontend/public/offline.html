<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#111827" />
    <title>TrueSight Offline</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0f172a;
        color: #f8fafc;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        max-width: 520px;
        border: 1px solid rgba(148, 163, 184, 0.24);
        border-radius: 18px;
        background: rgba(15, 23, 42, 0.92);
        padding: 28px;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
      }

      h1 {
        margin: 0 0 10px;
        font-size: 1.5rem;
      }

      p {
        margin: 0;
        color: #cbd5e1;
        line-height: 1.65;
      }

      a {
        display: inline-flex;
        margin-top: 20px;
        border-radius: 12px;
        background: #7c3aed;
        color: white;
        padding: 10px 14px;
        text-decoration: none;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>TrueSight is offline</h1>
      <p>
        You can still open cached pages, but live submissions, login, and analysis
        need an internet connection. Reconnect and try again.
      </p>
      <a href="/">Retry</a>
    </main>
  </body>
</html>
